<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EquiNode - Dashboard de Ahorro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
    </style>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <!-- Header -->
    <header class="p-6 bg-white shadow-sm flex justify-between items-center sticky top-0 z-10">
        <div>
            <h1 class="text-xs font-bold uppercase tracking-widest text-blue-600">EquiNode</h1>
            <p class="text-xl font-bold text-slate-800">Hola, Lara!</p>
        </div>
        <div class="relative">
            <i class="fa-regular fa-bell text-xl text-slate-600"></i>
            <span class="absolute -top-1 -right-1 bg-red-500 w-2 h-2 rounded-full"></span>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-6">

        <!-- Estado Global -->
        <section class="bg-blue-600 rounded-3xl p-6 text-white shadow-lg shadow-blue-200">
            <p class="text-blue-100 text-sm">Total en Bóveda Colectiva</p>
            <h2 class="text-3xl font-bold mt-1">$24,500.00 <span class="text-lg font-light">USD</span></h2>
            <div class="mt-4 flex items-center text-xs bg-blue-700 w-fit px-3 py-1 rounded-full">
                <i class="fa-solid fa-link mr-2"></i> Verificable en Blockchain
            </div>
        </section>

        <!-- Mis Pools -->
        <section>
            <h3 class="font-bold text-slate-800 mb-4">Mis Pools Activos</h3>
            <div id="pools-container" class="space-y-4">
                <!-- Los pools se cargan aquí con JS -->
            </div>
        </section>

        <!-- Próxima Distribución -->
        <section class="glass border border-white p-4 rounded-2xl flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <div class="bg-orange-100 p-3 rounded-xl text-orange-600">
                    <i class="fa-regular fa-calendar-check text-xl"></i>
                </div>
                <div>
                    <p class="text-sm font-bold text-slate-800">Día 15: Distribución</p>
                    <p class="text-xs text-slate-500">Faltan 8 días hábiles</p>
                </div>
            </div>
            <i class="fa-solid fa-chevron-right text-slate-300"></i>
        </section>

    </main>

    <!-- Navbar Inferior (Mobile Friendly) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 p-4 flex justify-around text-slate-400">
        <button class="text-blue-600"><i class="fa-solid fa-house text-xl"></i></button>
        <button><i class="fa-solid fa-magnifying-glass text-xl"></i></button>
        <button><i class="fa-solid fa-arrow-right-arrow-left text-xl"></i></button>
        <button><i class="fa-solid fa-user text-xl"></i></button>
    </nav>

    <!-- Script de Lógica -->
    <script>
        // Datos de ejemplo simulando una respuesta de API o Base de Datos
        const misAhorros = [
            { id: 'gold-04', tipo: 'Gold', monto: 1000, meta: 5000, actual: 3750, color: 'text-amber-500', bg: 'border-amber-500' },
            { id: 'silver-02', tipo: 'Silver', monto: 500, meta: 2000, actual: 1800, color: 'text-slate-400', bg: 'border-slate-300' }
        ];

        const container = document.getElementById('pools-container');

        // Función para renderizar los pools
        function renderPools() {
            container.innerHTML = misAhorros.map(pool => {
                const porcentaje = (pool.actual / pool.meta) * 100;
                return `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 ${pool.bg} hover:shadow-md transition-all">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] font-bold uppercase tracking-tighter ${pool.color}">Pool ${pool.tipo} #${pool.id.split('-')[1]}</span>
                                <p class="text-2xl font-bold text-slate-800">$${pool.monto} <span class="text-xs font-medium text-slate-400">USD</span></p>
                            </div>
                            <span class="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-1 rounded-md">ACTIVO</span>
                        </div>
                        
                        <div class="space-y-2">
                            <div class="flex justify-between text-[10px] font-semibold text-slate-500">
                                <span>Progreso del Grupo</span>
                                <span>${porcentaje}%</span>
                            </div>
                            <div class="w-full bg-slate-100 rounded-full h-1.5">
                                <div class="bg-blue-500 h-1.5 rounded-full" style="width: ${porcentaje}%"></div>
                            </div>
                            <div class="flex justify-between items-center mt-4">
                                <p class="text-[10px] text-slate-400">Próximo reparto: <span class="text-slate-700 font-medium">15 de Mayo</span></p>
                                <button class="text-blue-600 text-xs font-bold hover:underline">Ver detalles</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Ejecutar al cargar
        renderPools();

        // Simulación de bancos vinculados
const bancosVinculados = [
  { nombre: "Mercado Pago", pais: "Argentina", estado: "Conectado" },
  { nombre: "Chase Bank", pais: "USA", estado: "Pendiente" }
];

function realizarAporte(monto, poolId) {
  const cuentaPrincipal = bancosVinculados.find(b => b.estado === "Conectado");
  
  if (cuentaPrincipal) {
    console.log(`Solicitando $${monto} USD desde ${cuentaPrincipal.nombre}...`);
    // Aquí se llamaría a la API del banco o exchange
    alert(`Transferencia de $${monto} exitosa desde tu cuenta vinculada.`);
  } else {
    alert("Por favor, vincula una cuenta bancaria para aportar.");
  }
}

    </script>

    <div class="bg-slate-100 p-4 rounded-xl border border-slate-200 mt-6">
  <p class="text-[10px] font-bold text-slate-500 uppercase mb-3">Tu Método de Pago</p>
  <div class="flex items-center justify-between bg-white p-3 rounded-lg shadow-sm">
    <div class="flex items-center space-x-3">
      <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs">MP</div>
      <div>
        <p class="text-sm font-bold text-slate-800">Mercado Pago</p>
        <p class="text-[10px] text-green-500">Cuenta Verificada</p>
      </div>
    </div>
    <button class="text-blue-600 text-xs font-bold">Cambiar</button>
  </div>
</div>

</body>
</html>
